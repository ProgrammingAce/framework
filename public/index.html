<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cinematic Bazaar</title>
  <meta name="cinematic-bazaar-ws" content="wss://cinematic-bazaar.phil-7df.workers.dev/ws" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: 'Courier New', monospace; }
    .screen { display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
    .main-menu { justify-content: center; }
    .main-menu h1 { font-size: 48px; margin-bottom: 10px; letter-spacing: 4px; }
    .game-list { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; width: 100%; max-width: 500px; }
    .game-card { border: 1px solid #333; padding: 16px; border-radius: 4px; background: #111; }
    .game-card-body h2 { margin-bottom: 4px; }
    .muted { color: #888; font-size: 14px; }
    .btn-primary, .btn-secondary, .btn-danger, .btn-back, .btn-disabled {
      padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer;
      font-family: 'Courier New', monospace; font-size: 14px; background: #333; color: #fff;
    }
    .btn-primary { background: #0af; color: #000; }
    .btn-secondary { border: 1px solid #555; }
    .btn-danger { background: #a33; }
    .btn-back { padding: 4px 12px; font-size: 13px; }
    .btn-disabled { opacity: 0.4; cursor: default; }
    .name-row { margin: 10px 0; }
    .name-row label { display: flex; align-items: center; gap: 8px; color: #aaa; }
    .name-row input { background: #222; border: 1px solid #444; color: #fff; padding: 6px 10px; border-radius: 4px; font-family: inherit; }
    .browser-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; width: 100%; max-width: 600px; }
    .browser-header h1 { flex: 1; }
    .browser-header-actions { display: flex; gap: 8px; align-items: center; }
    .room-list { width: 100%; max-width: 600px; margin-bottom: 16px; }
    .section-label { color: #aaa; font-size: 13px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
    .refresh-note { color: #555; font-size: 12px; }
    .room-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border: 1px solid #222; background: #0a0a0a; border-radius: 4px; margin-bottom: 4px; }
    .room-info { display: flex; flex-direction: column; gap: 2px; }
    .room-name { font-weight: bold; }
    .room-meta { color: #777; font-size: 12px; }
    .room-code { color: #0af; margin-left: 8px; }
    .divider { color: #555; text-align: center; margin: 8px 0; width: 100%; max-width: 600px; }
    .join-code-row { display: flex; gap: 8px; width: 100%; max-width: 600px; }
    .code-input { flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 8px; font-family: inherit; border-radius: 4px; text-align: center; letter-spacing: 4px; font-size: 16px; }
    .empty-state { color: #666; padding: 20px; text-align: center; }
    .error-msg { color: #f55; margin-bottom: 8px; }
    .lobby { width: 100%; max-width: 500px; }
    .lobby-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .lobby-header h1 { font-size: 24px; }
    .room-code-display { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .code-label { color: #666; font-size: 11px; text-transform: uppercase; }
    .code-value { font-size: 28px; letter-spacing: 4px; color: #0af; font-weight: bold; }
    .player-list { margin: 12px 0; }
    .player-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-bottom: 1px solid #1a1a1a; }
    .player-row-me { background: #0a1a2a; }
    .player-swatch { width: 16px; height: 16px; border-radius: 50%; border: 1px solid #333; }
    .player-name { flex: 1; }
    .player-badges { display: flex; gap: 4px; }
    .badge { padding: 2px 6px; border-radius: 3px; font-size: 11px; }
    .badge-host { background: #aa0; color: #000; }
    .badge-me { background: #08a; color: #fff; }
    .badge-ready { color: #0a0; }
    .badge-waiting { color: #888; }
    .badge-neutral { background: #333; color: #aaa; }
    .lobby-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
    .lobby-actions button { align-self: stretch; }
    .hint { color: #666; font-style: italic; }
    .settings-panel { margin: 16px 0; width: 100%; }
    .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; }
    .setting-label { color: #aaa; }
    .setting-value { color: #0af; font-size: 13px; margin-left: 8px; }
    .setting-range-wrap { display: flex; align-items: center; gap: 8px; }
    .setting-toggle { width: 18px; height: 18px; }
    .setting-select { background: #222; color: #fff; border: 1px solid #444; padding: 4px 8px; border-radius: 4px; font-family: inherit; }
    .game-over { justify-content: center; text-align: center; }
    .game-over h1 { font-size: 36px; margin-bottom: 20px; color: #0af; }
    .score-list { margin-bottom: 24px; }
    .score-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 20px; border-bottom: 1px solid #1a1a1a; min-width: 300px; }
    .score-value { color: #0af; font-weight: bold; }
    .game-over-actions { display: flex; flex-direction: column; gap: 8px; align-self: center; width: 100%; max-width: 200px; }
    .htp-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 100; }
    .htp-dialog { background: #111; border: 1px solid #333; padding: 24px; max-width: 500px; width: 90%; border-radius: 4px; }
    .htp-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .htp-header h2 { font-size: 20px; }
    .htp-body { color: #ccc; font-size: 14px; line-height: 1.6; }
    .htp-body h3 { color: #0af; margin: 12px 0 4px; }
    .htp-body ul { padding-left: 20px; }
    .htp-body li { margin: 4px 0; }
    .center { justify-content: center; text-align: center; }
    canvas { display: block; margin: 0 auto; }
    button:hover:not(.btn-disabled):not(:disabled) { opacity: 0.8; }
    button:disabled { cursor: default; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="/client.js?v=1"></script>
</body>
</html>
